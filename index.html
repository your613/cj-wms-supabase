<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJ대한통운 WMS 시스템 v4.0 - 실시간 공유</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 기존 스타일 그대로 -->
    <style>
        /* 기존 CSS 코드 그대로 */
        .rack-item {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .rack-empty {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            border: 2px dashed #d1d5db;
        }
        .rack-occupied {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            border: 2px solid #3b82f6;
        }
        .rack-selected {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b;
            transform: scale(1.05);
        }
        .rack-warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b;
            animation: pulse 2s infinite;
        }
        .rack-critical {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border: 2px solid #ef4444;
            animation: pulse 2s infinite;
        }
        .tab-active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .alert-notification {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification-badge {
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .login-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .connection-status {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .online {
            background: #10b981;
            color: white;
        }
        .offline {
            background: #ef4444;
            color: white;
        }
        .syncing {
            background: #f59e0b;
            color: white;
        }
        
        /* 반응형 스타일 */
        @media (max-width: 768px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            .grid-cols-5 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .grid-cols-4 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .grid-cols-3 {
                grid-template-columns: repeat(1, minmax(0, 1fr));
            }
            .text-2xl {
                font-size: 1.5rem;
            }
            .text-xl {
                font-size: 1.25rem;
            }
            .hidden-mobile {
                display: none;
            }
            .tab-btn {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
            .mobile-scroll {
                overflow-x: auto;
                white-space: nowrap;
            }
            .mobile-scroll .tab-btn {
                display: inline-block;
                white-space: nowrap;
            }
        }
        @media (max-width: 640px) {
            .grid-cols-2 {
                grid-template-columns: repeat(1, minmax(0, 1fr));
            }
            .flex-col-mobile {
                flex-direction: column;
            }
            .space-x-4-mobile > * + * {
                margin-left: 0;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 연결 상태 표시 -->
    <div id="connectionStatus" class="connection-status online">
        🔄 URL 공유 모드
    </div>

    <!-- 로그인 화면 -->
    <div id="loginScreen" class="login-container flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-3xl">WMS</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">CJ대한통운</h1>
                <p class="text-gray-600">창고관리시스템 v4.0</p>
                <p class="text-sm text-gray-500 mt-2">🔄 URL 공유 버전</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">사용자 ID</label>
                    <input type="text" id="loginUserId" placeholder="사용자 ID를 입력하세요" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="비밀번호를 입력하세요" 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <button onclick="login()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors">
                    로그인
                </button>
            </div>
            
            <div class="mt-8 p-4 bg-gray-50 rounded-lg">
                <h4 class="font-medium text-gray-800 mb-2">테스트 계정</h4>
                <div class="text-sm text-gray-600 space-y-1">
                    <p><strong>관리자:</strong> admin / admin123</p>
                    <p><strong>편집자:</strong> editor / edit123</p>
                    <p><strong>조회자:</strong> viewer / view123</p>
                </div>
            </div>

            <div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                <p class="text-xs text-blue-800">
                    🔄 <strong>URL 공유:</strong><br>
                    데이터가 URL에 저장되어 공유 가능합니다!
                </p>
            </div>
        </div>
    </div>

    <!-- 메인 애플리케이션 (기존과 동일한 구조) -->
    <div id="mainApp" class="hidden">
        <!-- 기존 HTML 구조 그대로 -->
        <!-- 알림 컨테이너 -->
        <div id="alertContainer" class="fixed top-4 right-4 z-50 space-y-2 max-w-sm"></div>

        <!-- 헤더 -->
        <header class="bg-white shadow-lg border-b-4 border-blue-600">
            <div class="container mx-auto px-4 sm:px-6 py-4">
                <div class="flex items-center justify-between flex-wrap gap-4">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-600 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg sm:text-xl">WMS</span>
                        </div>
                        <div>
                            <h1 class="text-lg sm:text-2xl font-bold text-gray-800">CJ대한통운 WMS v4.0</h1>
                            <p class="text-sm text-gray-600 hidden sm:block">🔄 URL 공유 시스템</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="text-right hidden-mobile">
                            <div class="text-sm text-gray-500" id="currentTime"></div>
                            <div class="text-lg font-semibold text-blue-600">
                                총 렉: <span id="totalRacks">0</span>개
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <div class="text-right">
                                <div class="text-sm font-medium text-gray-800" id="currentUser"></div>
                                <div class="text-xs" id="userRole"></div>
                            </div>
                            <button onclick="shareURL()" class="bg-green-500 hover:bg-green-600 text-white px-2 sm:px-3 py-2 rounded-lg transition-colors text-sm">
                                📤 공유
                            </button>
                            <button onclick="showAlertSummary()" class="flex items-center space-x-2 bg-red-100 hover:bg-red-200 text-red-800 px-2 sm:px-3 py-2 rounded-lg transition-colors">
                                <span>⚠️</span>
                                <span class="hidden sm:inline">알림</span>
                                <span id="alertBadge" class="bg-red-600 text-white text-xs px-2 py-1 rounded-full notification-badge hidden">0</span>
                            </button>
                            <button onclick="logout()" class="bg-gray-500 hover:bg-gray-600 text-white px-2 sm:px-3 py-2 rounded-lg transition-colors text-sm">
                                로그아웃
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 기존 탭 네비게이션과 메인 컨텐츠 그대로 -->
        <!-- 여기에 기존의 모든 탭들이 들어갑니다 -->
        
        <!-- 간단히 렉 관리 탭만 예시로 표시 -->
        <nav class="bg-white shadow-sm">
            <div class="container mx-auto px-4 sm:px-6">
                <div class="flex space-x-1 mobile-scroll">
                    <button onclick="showTab('rack-management')" class="tab-btn px-3 sm:px-6 py-3 font-medium rounded-t-lg transition-all tab-active" id="tab-rack-management">
                        📦 <span class="hidden sm:inline">렉 관리</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 sm:px-6 py-4 sm:py-8">
            <div id="rack-management" class="tab-content">
                <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6 mb-6">
                    <h2 class="text-lg sm:text-xl font-bold mb-4 flex items-center">
                        <span class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center mr-3">📦</span>
                        렉 추가
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">렉 이름/번호</label>
                            <input type="text" id="rackName" placeholder="예: A-1, 냉동창고-1" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">위치 설명</label>
                            <input type="text" id="rackLocation" placeholder="예: 1층 좌측" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div class="flex items-end">
                            <button onclick="addRack()" id="addRackBtn"
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                                렉 추가
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                    <h3 class="text-lg font-bold mb-4">등록된 렉 목록 <span class="text-sm text-gray-500">(URL 공유)</span></h3>
                    <div id="rackList" class="space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // URL 기반 데이터 공유 시스템
        let racks = [];
        let inventory = [];
        let history = [];
        let alerts = [];
        let users = [
            { id: 'admin', name: '관리자', password: 'admin123', role: 'admin' },
            { id: 'editor', name: '편집자', password: 'edit123', role: 'editor' },
            { id: 'viewer', name: '조회자', password: 'view123', role: 'viewer' }
        ];
        let currentUser = null;

        // 권한 정의
        const permissions = {
            viewer: { canView: true, canEdit: false, canDelete: false, canManageUsers: false },
            editor: { canView: true, canEdit: true, canDelete: true, canManageUsers: false },
            admin: { canView: true, canEdit: true, canDelete: true, canManageUsers: true }
        };

        // URL에서 데이터 로드
        function loadDataFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataParam = urlParams.get('data');
            
            if (dataParam) {
                try {
                    const decodedData = atob(dataParam);
                    const data = JSON.parse(decodedData);
                    
                    racks = data.racks || [];
                    inventory = data.inventory || [];
                    history = data.history || [];
                    alerts = data.alerts || [];
                    users = data.users || users;
                    
                    console.log('✅ URL에서 데이터 로드 완료');
                    updateConnectionStatus('온라인 (URL 공유)');
                } catch (error) {
                    console.error('❌ URL 데이터 파싱 실패:', error);
                    updateConnectionStatus('오프라인 (로컬)');
                }
            } else {
                // 로컬 저장소에서 로드
                racks = JSON.parse(localStorage.getItem('wms_racks')) || [];
                inventory = JSON.parse(localStorage.getItem('wms_inventory')) || [];
                history = JSON.parse(localStorage.getItem('wms_history')) || [];
                alerts = JSON.parse(localStorage.getItem('wms_alerts')) || [];
                
                updateConnectionStatus('로컬 모드');
            }
            
            updateDisplay();
        }

        // URL로 데이터 저장 및 공유
        function saveDataToURL() {
            const data = {
                racks: racks,
                inventory: inventory,
                history: history,
                alerts: alerts,
                users: users,
                lastUpdated: new Date().toISOString(),
                updatedBy: currentUser ? currentUser.name : 'Unknown'
            };
            
            try {
                const encodedData = btoa(JSON.stringify(data));
                const newURL = window.location.origin + window.location.pathname + '?data=' + encodedData;
                
                // URL 업데이트 (페이지 새로고침 없이)
                window.history.replaceState({}, '', newURL);
                
                // 로컬 저장소에도 백업
                localStorage.setItem('wms_racks', JSON.stringify(racks));
                localStorage.setItem('wms_inventory', JSON.stringify(inventory));
                localStorage.setItem('wms_history', JSON.stringify(history));
                localStorage.setItem('wms_alerts', JSON.stringify(alerts));
                localStorage.setItem('wms_users', JSON.stringify(users));
                
                console.log('✅ URL 데이터 저장 완료');
                updateConnectionStatus('동기화 완료');
                
                return newURL;
            } catch (error) {
                console.error('❌ URL 데이터 저장 실패:', error);
                updateConnectionStatus('저장 실패');
                return null;
            }
        }

        // URL 공유 기능
        function shareURL() {
            const shareURL = saveDataToURL();
            
            if (shareURL) {
                if (navigator.share) {
                    // 모바일 공유 API 사용
                    navigator.share({
                        title: 'CJ대한통운 WMS 시스템',
                        text: '실시간 창고관리시스템 데이터를 공유합니다.',
                        url: shareURL
                    });
                } else {
                    // 클립보드 복사
                    navigator.clipboard.writeText(shareURL).then(() => {
                        alert('🔗 공유 URL이 클립보드에 복사되었습니다!\n\n다른 기기에서 이 URL로 접속하면 같은 데이터를 볼 수 있습니다.');
                    }).catch(() => {
                        // 클립보드 복사 실패 시 프롬프트로 표시
                        prompt('아래 URL을 복사해서 공유하세요:', shareURL);
                    });
                }
            } else {
                alert('❌ URL 생성에 실패했습니다.');
            }
        }

        // 연결 상태 업데이트
        function updateConnectionStatus(status) {
            const statusElement = document.getElementById('connectionStatus');
            if (statusElement) {
                statusElement.textContent = '🔄 ' + status;
            }
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // URL에서 데이터 로드
            loadDataFromURL();
            
            // 현재 사용자 확인
            currentUser = JSON.parse(localStorage.getItem('wms_current_user')) || null;
            
            if (currentUser) {
                showMainApp();
            } else {
                showLoginScreen();
            }
            
            // Enter 키로 로그인
            document.getElementById('loginPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });

        // 로그인 화면 표시
        function showLoginScreen() {
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
        }

        // 메인 앱 표시
        function showMainApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            // 시간 업데이트
            updateTime();
            setInterval(updateTime, 1000);
            
            // 사용자 정보 표시
            updateUserInfo();
            
            // 데이터 업데이트
            updateDisplay();
        }

        // 로그인
        function login() {
            const userId = document.getElementById('loginUserId').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!userId || !password) {
                alert('사용자 ID와 비밀번호를 입력해주세요.');
                return;
            }
            
            const user = users.find(u => u.id === userId && u.password === password);
            
            if (user) {
                currentUser = { id: user.id, name: user.name, role: user.role };
                localStorage.setItem('wms_current_user', JSON.stringify(currentUser));
                
                // 입력 필드 초기화
                document.getElementById('loginUserId').value = '';
                document.getElementById('loginPassword').value = '';
                
                showMainApp();
            } else {
                alert('잘못된 사용자 ID 또는 비밀번호입니다.');
            }
        }

        // 로그아웃
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                currentUser = null;
                localStorage.removeItem('wms_current_user');
                showLoginScreen();
            }
        }

        // 사용자 정보 업데이트
        function updateUserInfo() {
            if (currentUser) {
                document.getElementById('currentUser').textContent = currentUser.name;
                
                const roleText = {
                    admin: '👑 관리자',
                    editor: '✏️ 편집자', 
                    viewer: '👁️ 조회자'
                };
                
                const roleColor = {
                    admin: 'text-red-600',
                    editor: 'text-green-600',
                    viewer: 'text-blue-600'
                };
                
                const roleElement = document.getElementById('userRole');
                roleElement.textContent = roleText[currentUser.role];
                roleElement.className = `text-xs ${roleColor[currentUser.role]}`;
            }
        }

        // 권한 확인
        function hasPermission(action) {
            if (!currentUser) return false;
            return permissions[currentUser.role][action];
        }

        // 시간 업데이트
        function updateTime() {
            const now = new Date();
            const timeElement = document.getElementById('currentTime');
            if (timeElement) {
                timeElement.textContent = now.toLocaleString('ko-KR');
            }
        }

        // 렉 추가
        function addRack() {
            if (!hasPermission('canEdit')) {
                alert('편집 권한이 없습니다.');
                return;
            }
            
            const name = document.getElementById('rackName').value.trim();
            const location = document.getElementById('rackLocation').value.trim();
            
            if (!name) {
                alert('렉 이름을 입력해주세요.');
                return;
            }
            
            // 중복 확인
            if (racks.find(rack => rack.name === name)) {
                alert('이미 존재하는 렉 이름입니다.');
                return;
            }
            
            const newRack = {
                id: Date.now().toString(),
                name: name,
                location: location,
                createdAt: new Date().toISOString(),
                createdBy: currentUser.id
            };
            
            racks.push(newRack);
            
            // URL에 저장
            saveDataToURL();
            updateDisplay();
            
            // 입력 필드 초기화
            document.getElementById('rackName').value = '';
            document.getElementById('rackLocation').value = '';
            
            alert('렉이 추가되었습니다! 📤 공유 버튼을 눌러 다른 기기와 동기화하세요.');
        }

        // 렉 목록 업데이트
        function updateRackList() {
            const rackList = document.getElementById('rackList');
            if (!rackList) return;
            
            if (racks.length === 0) {
                rackList.innerHTML = '<p class="text-gray-500 text-center py-8">등록된 렉이 없습니다.</p>';
                return;
            }
            
            rackList.innerHTML = racks.map(rack => `
                <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:bg-gray-50">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3">
                            <h4 class="font-medium text-gray-900">${rack.name}</h4>
                            <span class="bg-gray-100 text-gray-800 text-xs px-2 py-1 rounded-full">빈 렉</span>
                        </div>
                        <p class="text-sm text-gray-500">${rack.location || '위치 정보 없음'}</p>
                        <p class="text-xs text-gray-400">생성일: ${new Date(rack.createdAt).toLocaleDateString('ko-KR')}</p>
                    </div>
                    ${hasPermission('canDelete') ? `
                        <button onclick="deleteRack('${rack.id}')" 
                                class="text-red-600 hover:text-red-800 p-2 rounded-lg hover:bg-red-50 transition-colors">
                            🗑️
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }

        // 렉 삭제
        function deleteRack(rackId) {
            if (!hasPermission('canDelete')) {
                alert('삭제 권한이 없습니다.');
                return;
            }
            
            if (confirm('정말로 이 렉을 삭제하시겠습니까?')) {
                racks = racks.filter(rack => rack.id !== rackId);
                saveDataToURL();
                updateDisplay();
            }
        }

        // 통계 업데이트
        function updateStats() {
            const totalRacks = racks.length;
            const totalRacksElement = document.getElementById('totalRacks');
            if (totalRacksElement) {
                totalRacksElement.textContent = totalRacks;
            }
        }

        // 전체 디스플레이 업데이트
        function updateDisplay() {
            updateStats();
            updateRackList();
        }

        // 알림 요약 (임시)
        function showAlertSummary() {
            alert('현재 활성화된 알림이 없습니다.');
        }

        // 탭 전환 (임시)
        function showTab(tabName) {
            // 현재는 렉 관리 탭만 구현
            console.log('탭 전환:', tabName);
        }
    </script>
</body>
</html>
